<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onyx AI — Search & Predict</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f6; --surface: #ffffff; --surface2: #f3f3f2;
      --border: #e5e4e2; --border2: #d1d0cd;
      --blue: #1565ff; --blue-soft: #eff3ff; --blue-glow: rgba(21,101,255,0.08);
      --text: #111827; --text2: #4b5563; --grey: #9ca3af; --grey2: #6b7280;
      --green: #16a34a; --green-dim: rgba(22,163,74,0.08);
      --red: #dc2626; --red-dim: rgba(220,38,38,0.08);
      --yellow: #d97706; --yellow-dim: rgba(217,119,6,0.08);
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --sidebar-w: 200px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; }
    .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .logo-row { display: flex; align-items: center; gap: 9px; }
    .logo-icon { width: 28px; height: 28px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
    .logo-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .logo-sub { font-size: 10px; color: var(--grey); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
    .sidebar-nav { padding: 12px 10px; flex: 1; }
    .nav-section { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey); padding: 10px 8px 5px; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 6px; color: var(--grey2); text-decoration: none; font-size: 12px; font-weight: 500; transition: all 0.12s; margin-bottom: 1px; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--blue-soft); color: var(--blue); }
    .nav-disabled { display: flex; align-items: center; gap: 9px; padding: 8px 10px; color: var(--grey); font-size: 12px; font-weight: 500; opacity: 0.5; cursor: not-allowed; }
    .nav-chip { font-size: 9px; background: var(--surface2); color: var(--grey); padding: 1px 5px; border-radius: 8px; margin-left: auto; border: 1px solid var(--border); }
    .sidebar-footer { padding: 14px 16px; border-top: 1px solid var(--border); }
    .market-pill { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text2); }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.open { background: var(--green); }
    .dot.closed { background: var(--red); }

    /* Main */
    .main { margin-left: var(--sidebar-w); padding: 28px; max-width: 860px; }

    /* Tabs */
    .mode-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 24px; width: fit-content; box-shadow: var(--shadow); }
    .mode-tab { padding: 7px 18px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--grey2); transition: all 0.12s; font-family: 'Inter', sans-serif; }
    .mode-tab.active { background: var(--blue); color: white; }
    .mode-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

    /* Search card */
    .search-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .search-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--grey); margin-bottom: 12px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row:last-child { margin-bottom: 0; }
    .search-input { flex: 1; background: var(--bg); border: 1px solid var(--border2); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 14px; border-radius: 6px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-glow); }
    .search-input::placeholder { color: var(--grey); }
    .source-input { background: var(--bg); border: 1px solid var(--border2); color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px; padding: 9px 14px; border-radius: 6px; outline: none; flex: 1; transition: border-color 0.15s, box-shadow 0.15s; }
    .source-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-glow); }
    .source-input::placeholder { color: var(--grey); }
    .source-label { font-size: 11px; color: var(--grey2); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .source-label svg { opacity: 0.5; }
    .select-input { background: var(--bg); border: 1px solid var(--border2); color: var(--text2); font-family: 'Inter', sans-serif; font-size: 12px; padding: 9px 12px; border-radius: 6px; outline: none; cursor: pointer; appearance: none; min-width: 110px; }

    .btn { border: none; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 9px 18px; border-radius: 6px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: #1a6fff; }
    .btn-primary:disabled { background: var(--border2); color: var(--grey); cursor: not-allowed; }

    /* Loading */
    .loading { display: none; padding: 48px; text-align: center; }
    .loading.active { display: block; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 12px; color: var(--grey2); font-family: 'JetBrains Mono', monospace; }

    /* Error */
    .error-box { display: none; background: var(--red-dim); border: 1px solid rgba(220,38,38,0.2); border-radius: 8px; padding: 14px 18px; color: var(--red); font-size: 12px; margin-bottom: 16px; }
    .error-box.active { display: block; }

    /* Results */
    .results { display: none; }
    .results.active { display: block; }

    /* Stock hero */
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .stock-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .stock-ticker { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 600; color: var(--text); line-height: 1; }
    .stock-name { font-size: 12px; color: var(--grey); margin-top: 5px; }
    .score-display { text-align: right; }
    .score-big { font-family: 'JetBrains Mono', monospace; font-size: 44px; font-weight: 700; line-height: 1; }
    .score-big.hi { color: var(--green); } .score-big.mi { color: var(--yellow); } .score-big.lo { color: var(--red); } .score-big.nd { color: var(--grey); }
    .score-out { font-size: 13px; color: var(--grey); }
    .sig-badge-lg { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 18px; border-radius: 6px; display: inline-block; margin-top: 8px; }
    .sig-badge-lg.buy { background: var(--green-dim); color: var(--green); }
    .sig-badge-lg.watch { background: var(--yellow-dim); color: var(--yellow); }
    .sig-badge-lg.hold { background: var(--surface2); color: var(--text2); }
    .sig-badge-lg.sell { background: var(--red-dim); color: var(--red); }

    .conf-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .conf-track { flex: 1; background: var(--border); height: 4px; border-radius: 2px; max-width: 120px; }
    .conf-fill { height: 4px; border-radius: 2px; background: var(--blue); }
    .conf-txt { font-size: 11px; color: var(--grey); }

    .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .meta-item .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey); margin-bottom: 3px; }
    .meta-item .meta-val { font-size: 12px; color: var(--text); font-family: 'JetBrains Mono', monospace; }

    .summary-bar { background: var(--blue-soft); border-left: 3px solid var(--blue); border-radius: 0 6px 6px 0; padding: 12px 16px; font-size: 12px; line-height: 1.7; color: var(--text2); margin-bottom: 14px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .list-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .list-title.green { color: var(--green); } .list-title.red { color: var(--red); }
    .bullet-list { list-style: none; }
    .bullet-item { font-size: 12px; color: var(--text2); padding: 6px 0 6px 14px; border-bottom: 1px solid var(--border); position: relative; line-height: 1.5; }
    .bullet-item:last-child { border-bottom: none; }
    .bullet-item.up::before { content:'↑'; position:absolute; left:0; color:var(--green); font-weight:600; }
    .bullet-item.dn::before { content:'↓'; position:absolute; left:0; color:var(--red); font-weight:600; }

    .signals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .sig-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .sig-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--blue); margin-bottom: 5px; font-weight: 600; }
    .sig-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 7px; }
    .sig-src { font-size: 11px; color: var(--grey); text-decoration: none; }
    .sig-src:hover { color: var(--blue); }

    .add-btn { background: var(--blue); color: white; border: none; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 9px 18px; border-radius: 6px; cursor: pointer; transition: background 0.12s; }
    .add-btn:hover { background: #1a6fff; }

    /* Prediction results */
    .pred-meta { margin-bottom: 12px; }
    .pred-topic { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .pred-tags { display: flex; gap: 8px; }
    .pred-tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; background: var(--surface2); color: var(--grey2); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }

    .pred-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .pred-card-top { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
    .pred-statement { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.5; flex: 1; }
    .pred-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .conf-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 4px; }
    .conf-badge.high { background: var(--green-dim); color: var(--green); }
    .conf-badge.medium { background: var(--yellow-dim); color: var(--yellow); }
    .conf-badge.low { background: var(--surface2); color: var(--grey2); }
    .horizon-txt { font-size: 11px; color: var(--grey); font-family: 'JetBrains Mono', monospace; }
    .pred-card-body { padding: 14px 20px; background: #fafaf9; }
    .pred-reasoning { font-size: 12px; color: var(--text2); line-height: 1.7; }
    .pred-signals-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .pred-sig-item { display: flex; gap: 7px; font-size: 11px; color: var(--grey2); line-height: 1.4; }
    .pred-sig-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 4px; }

    .sources-note { font-size: 11px; color: var(--grey); font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-row">
      <div class="logo-icon">O</div>
      <div>
        <div class="logo-name">Onyx AI</div>
        <div class="logo-sub">Intelligence</div>
      </div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a class="nav-item" href="/">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm0 7h5v5H2V9zm7-7h5v5H9V2zm0 7h5v5H9V9z"/></svg>
      Dashboard
    </a>
    <a class="nav-item active" href="/search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg>
      Search & Predict
    </a>
    <div class="nav-section" style="margin-top:16px">Coming Soon</div>
    <div class="nav-disabled">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
      Trading
      <span class="nav-chip">Soon</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="market-pill">
      <div class="dot" id="mktDot"></div>
      <span id="mktTxt">Checking...</span>
    </div>
  </div>
</aside>

<!-- Main -->
<main class="main">

  <div class="mode-tabs">
    <button class="mode-tab active" id="tabStock" onclick="setMode('stock')">Stock / Crypto Signal</button>
    <button class="mode-tab" id="tabPredict" onclick="setMode('predict')">Market Prediction</button>
  </div>

  <!-- Stock mode -->
  <div id="stockMode">
    <div class="search-card">
      <div class="search-label">Analyse a Stock or Crypto</div>
      <div class="search-row">
        <input class="search-input" type="text" id="tickerInput" placeholder="Enter ticker e.g. AAPL, NVDA, BTC-USD" style="text-transform:uppercase"/>
        <select class="select-input" id="assetType">
          <option value="stock">Stock</option>
          <option value="crypto">Crypto</option>
        </select>
        <button class="btn btn-primary" id="stockBtn" onclick="runStockScan()">Analyse →</button>
      </div>
      <div class="search-row" style="align-items:center">
        <span class="source-label">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/><path d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/></svg>
          Custom source (optional)
        </span>
        <input class="source-input" type="url" id="stockSource" placeholder="Paste a URL you want the AI to consider e.g. https://reuters.com/article/..."/>
      </div>
    </div>
  </div>

  <!-- Predict mode -->
  <div id="predictMode" style="display:none">
    <div class="search-card">
      <div class="search-label">Predict a Market Topic</div>
      <div class="search-row">
        <input class="search-input" type="text" id="topicInput" placeholder="e.g. Federal Reserve rate decision, AI regulation, oil prices"/>
        <select class="select-input" id="domainSelect">
          <option value="markets">Markets</option>
          <option value="tech">Tech</option>
          <option value="geopolitics">Geopolitics</option>
        </select>
        <select class="select-input" id="horizonSelect">
          <option value="1-2 weeks">1-2 weeks</option>
          <option value="1-7 days">1-7 days</option>
          <option value="3-4 weeks">3-4 weeks</option>
        </select>
        <button class="btn btn-primary" id="predictBtn" onclick="runPrediction()">Predict →</button>
      </div>
      <div class="search-row" style="align-items:center">
        <span class="source-label">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/><path d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/></svg>
          Custom source (optional)
        </span>
        <input class="source-input" type="url" id="predictSource" placeholder="Paste a URL you want the AI to consider e.g. https://bloomberg.com/article/..."/>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-txt" id="loadingText">Scanning signals...</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Stock Results -->
  <div class="results" id="stockResults">
    <div class="result-card">
      <div class="stock-top">
        <div>
          <div class="stock-ticker" id="resTicker"></div>
          <div class="stock-name" id="resName"></div>
        </div>
        <div class="score-display">
          <div class="score-big nd" id="resScore">—</div>
          <div class="score-out">/ 10</div>
          <div class="sig-badge-lg pending" id="resBadge">—</div>
          <div class="conf-row">
            <div class="conf-track"><div class="conf-fill" id="resConfBar" style="width:0%"></div></div>
            <span class="conf-txt" id="resConfTxt">—</span>
          </div>
        </div>
      </div>
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-label">Confidence</div><div class="meta-val" id="resConf">—</div></div>
        <div class="meta-item"><div class="meta-label">Time Horizon</div><div class="meta-val" id="resHorizon">—</div></div>
        <div class="meta-item"><div class="meta-label">Type</div><div class="meta-val" id="resType">—</div></div>
      </div>
    </div>

    <div class="summary-bar" id="resSummary"></div>

    <div class="two-col">
      <div class="list-card">
        <div class="list-title green">↑ Catalysts</div>
        <ul class="bullet-list" id="resCatalysts"></ul>
      </div>
      <div class="list-card">
        <div class="list-title red">↓ Risk Factors</div>
        <ul class="bullet-list" id="resRisks"></ul>
      </div>
    </div>

    <div class="signals-grid" id="resSignals"></div>
    <button class="add-btn" style="margin-bottom:24px" onclick="addToWatchlist()">+ Add to Watchlist</button>
  </div>

  <!-- Prediction Results -->
  <div class="results" id="predictResults">
    <div class="pred-meta">
      <div class="pred-topic" id="predTopic"></div>
      <div class="pred-tags">
        <span class="pred-tag" id="predDomain"></span>
        <span class="pred-tag" id="predHorizon"></span>
      </div>
    </div>
    <div class="summary-bar" id="predSummary"></div>
    <div class="sources-note" id="predSources"></div>
    <div id="predList"></div>
  </div>

</main>

<script>
const API = 'https://prediction-api-production-ad66.up.railway.app';
let currentMode = 'stock';
let lastStockResult = null;

// Market status
const now = new Date();
const h = now.getUTCHours(), d = now.getUTCDay();
const open = d > 0 && d < 6 && h >= 13 && h < 21;
document.getElementById('mktDot').className = 'dot ' + (open ? 'open' : 'closed');
document.getElementById('mktTxt').textContent = open ? 'Market Open' : 'Market Closed';

document.getElementById('tickerInput').addEventListener('keydown', e => { if (e.key === 'Enter') runStockScan(); });
document.getElementById('topicInput').addEventListener('keydown', e => { if (e.key === 'Enter') runPrediction(); });

function setMode(mode) {
  currentMode = mode;
  document.getElementById('stockMode').style.display = mode === 'stock' ? 'block' : 'none';
  document.getElementById('predictMode').style.display = mode === 'predict' ? 'block' : 'none';
  document.getElementById('tabStock').className = 'mode-tab' + (mode === 'stock' ? ' active' : '');
  document.getElementById('tabPredict').className = 'mode-tab' + (mode === 'predict' ? ' active' : '');
  document.getElementById('stockResults').classList.remove('active');
  document.getElementById('predictResults').classList.remove('active');
  document.getElementById('errorBox').classList.remove('active');
}

async function runStockScan() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  const assetType = document.getElementById('assetType').value;
  const customSource = document.getElementById('stockSource').value.trim();
  if (!ticker) { document.getElementById('tickerInput').focus(); return; }

  const btn = document.getElementById('stockBtn');
  btn.disabled = true;
  document.getElementById('loadingState').classList.add('active');
  document.getElementById('stockResults').classList.remove('active');
  document.getElementById('errorBox').classList.remove('active');
  document.getElementById('loadingText').textContent = `Analysing ${ticker}...`;

  try {
    const body = { ticker, asset_type: assetType };
    if (customSource) body.custom_source = customSource;
    const res = await fetch(`${API}/invest`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    lastStockResult = { ticker, assetType, data };
    renderStockResult(data, ticker, assetType);
  } catch(e) {
    const eb = document.getElementById('errorBox');
    eb.textContent = `Error: ${e.message}`;
    eb.classList.add('active');
  } finally {
    document.getElementById('loadingState').classList.remove('active');
    btn.disabled = false;
  }
}

function renderStockResult(data, ticker, assetType) {
  const sm = { BUY:{High:8.5,Medium:7.0,Low:6.0}, WATCH:{High:6.0,Medium:5.5,Low:4.5}, HOLD:{High:5.0,Medium:4.5,Low:4.0}, SELL:{High:2.0,Medium:3.0,Low:3.5} };
  const score = sm[data.signal]?.[data.confidence] ?? 5.0;
  const sc = score >= 7 ? 'hi' : score >= 5 ? 'mi' : 'lo';
  const confPct = data.confidence === 'High' ? 85 : data.confidence === 'Medium' ? 60 : 35;
  const sigCls = data.signal.toLowerCase();

  document.getElementById('resTicker').textContent = ticker;
  document.getElementById('resName').textContent = data.asset_name || '';
  const scoreEl = document.getElementById('resScore');
  scoreEl.textContent = score.toFixed(1);
  scoreEl.className = `score-big ${sc}`;
  const badge = document.getElementById('resBadge');
  badge.textContent = data.signal;
  badge.className = `sig-badge-lg ${sigCls}`;
  document.getElementById('resConfBar').style.width = `${confPct}%`;
  document.getElementById('resConfTxt').textContent = data.confidence;
  document.getElementById('resConf').textContent = data.confidence;
  document.getElementById('resHorizon').textContent = data.time_horizon;
  document.getElementById('resType').textContent = assetType === 'stock' ? 'Equity' : 'Crypto';
  document.getElementById('resSummary').textContent = data.summary;
  document.getElementById('resCatalysts').innerHTML = (data.catalysts||[]).map(c=>`<li class="bullet-item up">${c}</li>`).join('');
  document.getElementById('resRisks').innerHTML = (data.risks||[]).map(r=>`<li class="bullet-item dn">${r}</li>`).join('');
  document.getElementById('resSignals').innerHTML = (data.supporting_signals||[]).map(s => {
    const link = s.url ? `<a class="sig-src" href="${s.url}" target="_blank" rel="noopener">${s.source} ↗</a>`
      : s.source ? `<a class="sig-src" href="https://news.google.com/search?q=${encodeURIComponent(s.source+' '+ticker)}" target="_blank">${s.source} ↗</a>` : '';
    return `<div class="sig-card"><div class="sig-type">${s.type}</div><div class="sig-desc">${s.description}</div>${link}</div>`;
  }).join('');

  document.getElementById('stockResults').classList.add('active');
  document.getElementById('stockResults').scrollIntoView({ behavior:'smooth', block:'start' });
}

function addToWatchlist() {
  if (!lastStockResult) return;
  const wl = JSON.parse(localStorage.getItem('onyx_wl_v3') || '[]');
  const { ticker, assetType } = lastStockResult;
  if (!wl.find(w => w.ticker === ticker)) {
    wl.push({ ticker, type: assetType, signal:null, score:null, confidence:null, scannedAt:null, note:'', prevSignal:null, catalysts:[], risks:[] });
    localStorage.setItem('onyx_wl_v3', JSON.stringify(wl));
    alert(`${ticker} added to your Dashboard watchlist!`);
  } else { alert(`${ticker} is already in your watchlist.`); }
}

async function runPrediction() {
  const topic = document.getElementById('topicInput').value.trim();
  const domain = document.getElementById('domainSelect').value;
  const horizon = document.getElementById('horizonSelect').value;
  const customSource = document.getElementById('predictSource').value.trim();
  if (!topic) { document.getElementById('topicInput').focus(); return; }

  const btn = document.getElementById('predictBtn');
  btn.disabled = true;
  document.getElementById('loadingState').classList.add('active');
  document.getElementById('predictResults').classList.remove('active');
  document.getElementById('errorBox').classList.remove('active');
  document.getElementById('loadingText').textContent = `Scanning signals for "${topic}"...`;

  try {
    const body = { topic, domain, time_horizon: horizon };
    if (customSource) body.custom_source = customSource;
    const res = await fetch(`${API}/predict`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    renderPrediction(data, topic, domain, horizon);
  } catch(e) {
    const eb = document.getElementById('errorBox');
    eb.textContent = `Error: ${e.message}`;
    eb.classList.add('active');
  } finally {
    document.getElementById('loadingState').classList.remove('active');
    btn.disabled = false;
  }
}

function renderPrediction(data, topic, domain, horizon) {
  document.getElementById('predTopic').textContent = topic;
  document.getElementById('predDomain').textContent = domain.toUpperCase();
  document.getElementById('predHorizon').textContent = horizon;
  document.getElementById('predSummary').textContent = data.news_summary;
  document.getElementById('predSources').textContent = `Searched: ${(data.sources_searched||[]).join(' · ')}`;

  document.getElementById('predList').innerHTML = (data.predictions||[]).map(p => {
    const cc = p.confidence.toLowerCase();
    const signals = (p.supporting_signals||[]).map(s=>`
      <div class="pred-sig-item"><div class="pred-sig-dot"></div><div>${s.description}${s.source?` <em style="color:var(--grey)">(${s.source})</em>`:''}</div></div>
    `).join('');
    return `<div class="pred-card">
      <div class="pred-card-top">
        <div class="pred-statement">${p.statement}</div>
        <div class="pred-right">
          <span class="conf-badge ${cc}">${p.confidence}</span>
          <span class="horizon-txt">${p.time_horizon}</span>
        </div>
      </div>
      <div class="pred-card-body">
        <div class="pred-reasoning">${p.reasoning}</div>
        <div class="pred-signals-row">${signals}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('predictResults').classList.add('active');
  document.getElementById('predictResults').scrollIntoView({ behavior:'smooth', block:'start' });
}
</script>
</body>
</html>
