<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onyx AI — Daily Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --obsidian: #0f0f0f; --charcoal: #1a1a1a;
      --gold: #c9a84c; --gold-light: #e2c47a; --gold-dim: #7a6230;
      --white: #f0ece4; --muted: #6b6760; --text: #ccc5b9;
      --buy: #4caf7a; --watch: #c9a84c; --hold: #c0554a; --sell: #e53935;
    }
    html, body { height: 100%; background: var(--black); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.02em; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.4; }
    .container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; max-width: 1100px; margin: 0 auto; padding: 0 32px; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 36px 0 24px; border-bottom: 1px solid #1e1e1e; }
    .logo { display: flex; align-items: baseline; gap: 10px; text-decoration: none; }
    .logo-mark { width: 22px; height: 22px; background: var(--gold); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); flex-shrink: 0; position: relative; top: 2px; }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--white); letter-spacing: 0.12em; text-transform: uppercase; }
    .logo-sub { font-size: 10px; color: var(--gold-dim); letter-spacing: 0.18em; text-transform: uppercase; }
    nav { display: flex; gap: 24px; }
    nav a { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    nav a:hover { color: var(--white); }
    nav a.active { color: var(--gold); }

    /* Dashboard header */
    .dash-header { display: flex; align-items: center; justify-content: space-between; padding: 40px 0 28px; }
    .dash-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--white); }
    .dash-date { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-top: 4px; }
    .dash-actions { display: flex; gap: 10px; }

    .btn { border: none; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; padding: 10px 18px; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
    .btn:active { transform: scale(0.98); }
    .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold-dim); }
    .btn-outline:hover { background: #1a1a1a; }
    .btn-primary { background: var(--gold); color: var(--black); }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:disabled { background: var(--gold-dim); cursor: not-allowed; }

    /* Summary strip */
    .summary-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
    .strip-card { background: var(--obsidian); border: 1px solid #1e1e1e; padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
    .strip-num { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; line-height: 1; }
    .strip-num.sell { color: var(--sell); } .strip-num.buy { color: var(--buy); } .strip-num.watch { color: var(--watch); } .strip-num.hold { color: var(--hold); }
    .strip-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

    /* Add ticker row */
    .add-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .add-row input { background: var(--charcoal); border: 1px solid #2a2a2a; color: var(--white); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; width: 160px; text-transform: uppercase; transition: border-color 0.2s; }
    .add-row input::placeholder { color: var(--muted); text-transform: none; }
    .add-row input:focus { border-color: var(--gold-dim); }
    .add-row select { background: var(--charcoal); border: 1px solid #2a2a2a; color: var(--white); font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px 12px; outline: none; cursor: pointer; appearance: none; }

    /* Progress */
    .progress-wrap { display: none; background: var(--charcoal); border: 1px solid #222; padding: 16px 20px; margin-bottom: 16px; }
    .progress-wrap.active { display: block; }
    .progress-track { background: #1a1a1a; height: 2px; width: 100%; margin: 10px 0 6px; }
    .progress-fill { background: var(--gold); height: 2px; width: 0%; transition: width 0.5s ease; }
    .progress-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); }
    .progress-status { font-size: 11px; color: var(--muted); }

    /* Main table */
    .table-wrap { background: var(--obsidian); border: 1px solid #1e1e1e; margin-bottom: 40px; }
    .table-header { display: grid; grid-template-columns: 100px 90px 80px 90px 110px 120px 1fr 80px; gap: 0; padding: 12px 20px; border-bottom: 1px solid #1a1a1a; }
    .th { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); }
    .ticker-row { display: grid; grid-template-columns: 100px 90px 80px 90px 110px 120px 1fr 80px; gap: 0; padding: 16px 20px; border-bottom: 1px solid #111; align-items: center; transition: background 0.15s; }
    .ticker-row:hover { background: #0d0d0d; }
    .ticker-row:last-child { border-bottom: none; }

    .td-ticker { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--white); letter-spacing: 0.05em; }
    .td-type { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .td-price { font-size: 14px; color: var(--white); }
    .td-change { font-size: 12px; }
    .td-change.pos { color: var(--buy); }
    .td-change.neg { color: var(--sell); }
    .td-change.neu { color: var(--muted); }

    .signal-badge { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border: 1px solid; display: inline-block; }
    .signal-badge.buy { color: var(--buy); border-color: var(--buy); }
    .signal-badge.watch { color: var(--watch); border-color: var(--watch); }
    .signal-badge.hold { color: var(--hold); border-color: var(--hold); }
    .signal-badge.sell { color: var(--sell); border-color: var(--sell); }
    .signal-badge.pending { color: var(--muted); border-color: #333; }

    .alert-badge { font-size: 10px; color: var(--gold); letter-spacing: 0.05em; }
    .td-scanned { font-size: 10px; color: var(--muted); }

    .note-input { background: transparent; border: none; border-bottom: 1px solid #2a2a2a; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; width: 100%; padding: 4px 0; outline: none; transition: border-color 0.2s; }
    .note-input:focus { border-color: var(--gold-dim); }
    .note-input::placeholder { color: #3a3a3a; }

    .scan-row-btn { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: transparent; border: 1px solid #2a2a2a; color: var(--muted); padding: 5px 10px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.2s; }
    .scan-row-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .scan-row-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .remove-btn { background: none; border: none; color: #333; cursor: pointer; font-size: 16px; transition: color 0.2s; margin-left: 6px; }
    .remove-btn:hover { color: var(--sell); }

    .empty-row { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 12px; }

    /* History panel */
    .history-section { margin-bottom: 40px; }
    .section-title { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #1a1a1a; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item { background: var(--obsidian); border: 1px solid #1e1e1e; padding: 14px 20px; display: grid; grid-template-columns: 80px 80px 1fr auto; gap: 16px; align-items: center; }
    .hi-ticker { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--white); }
    .hi-time { font-size: 10px; color: var(--muted); }
    .hi-summary { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .hi-change { font-size: 10px; color: var(--gold); text-align: right; }

    footer { margin-top: auto; padding: 32px 0; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }

    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .scanning { animation: pulse 1s ease-in-out infinite; }

    @media (max-width: 800px) {
      .table-header, .ticker-row { grid-template-columns: 80px 70px 70px 80px 100px 1fr 60px; }
      .th:nth-child(6), .ticker-row > *:nth-child(6) { display: none; }
      .summary-strip { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <a class="logo" href="/">
      <div class="logo-mark"></div>
      <span class="logo-name">Onyx</span>
      <span class="logo-sub">Intelligence</span>
    </a>
    <nav>
      <a href="/">Predictions</a>
      <a href="/invest">Investments</a>
      <a href="/watchlist" class="active">Watchlist</a>
    </nav>
  </header>

  <div class="dash-header">
    <div>
      <div class="dash-title">Daily Dashboard</div>
      <div class="dash-date" id="dashDate"></div>
    </div>
    <div class="dash-actions">
      <button class="btn btn-outline" onclick="refreshPrices()">↻ Prices</button>
      <button class="btn btn-primary" id="scanAllBtn" onclick="scanAll()">Scan All →</button>
    </div>
  </div>

  <!-- Summary strip -->
  <div class="summary-strip">
    <div class="strip-card"><div class="strip-num sell" id="cntSell">0</div><div class="strip-label">Sell</div></div>
    <div class="strip-card"><div class="strip-num buy" id="cntBuy">0</div><div class="strip-label">Buy</div></div>
    <div class="strip-card"><div class="strip-num watch" id="cntWatch">0</div><div class="strip-label">Watch</div></div>
    <div class="strip-card"><div class="strip-num hold" id="cntHold">0</div><div class="strip-label">Hold</div></div>
  </div>

  <!-- Add ticker -->
  <div class="add-row">
    <input type="text" id="tickerInput" placeholder="Add ticker e.g. AAPL" maxlength="10" />
    <select id="assetType">
      <option value="stock">Stock</option>
      <option value="crypto">Crypto</option>
    </select>
    <button class="btn btn-outline" onclick="addTicker()">+ Add</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">Scanning Watchlist</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-status" id="progressStatus">Preparing...</div>
  </div>

  <!-- Main table -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="th">Ticker</div>
      <div class="th">Price</div>
      <div class="th">Change</div>
      <div class="th">Signal</div>
      <div class="th">Alert</div>
      <div class="th">Last Scanned</div>
      <div class="th">Notes</div>
      <div class="th"></div>
    </div>
    <div id="tableBody">
      <div class="empty-row">No tickers yet — add one above</div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="section-title">Scan History</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <footer>
    <span>Onyx AI · Daily Dashboard</span>
    <span id="footerTime"></span>
  </footer>
</div>

<script>
const API = 'https://prediction-api-production-ad66.up.railway.app';

// State
let watchlist = JSON.parse(localStorage.getItem('onyx_watchlist_v2') || '[]');
let scanHistory = JSON.parse(localStorage.getItem('onyx_history') || '[]');
let prices = {};

// Init
document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
document.getElementById('footerTime').textContent = new Date().toLocaleTimeString();

document.getElementById('tickerInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTicker(); });

renderTable();
renderHistory();
if (watchlist.length > 0) refreshPrices();

function save() {
  localStorage.setItem('onyx_watchlist_v2', JSON.stringify(watchlist));
  localStorage.setItem('onyx_history', JSON.stringify(scanHistory));
}

function addTicker() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  const type = document.getElementById('assetType').value;
  if (!ticker) return;
  if (watchlist.find(w => w.ticker === ticker)) { document.getElementById('tickerInput').value = ''; return; }
  watchlist.push({ ticker, type, signal: null, confidence: null, scannedAt: null, note: '' });
  save();
  renderTable();
  document.getElementById('tickerInput').value = '';
  refreshPrices();
}

function removeTicker(ticker) {
  watchlist = watchlist.filter(w => w.ticker !== ticker);
  save();
  renderTable();
  updateSummary();
}

function saveNote(ticker, note) {
  const w = watchlist.find(w => w.ticker === ticker);
  if (w) { w.note = note; save(); }
}

async function refreshPrices() {
  if (watchlist.length === 0) return;
  const tickers = watchlist.map(w => w.ticker).join(',');
  try {
    const res = await fetch(`${API}/prices?tickers=${encodeURIComponent(tickers)}`);
    if (res.ok) {
      prices = await res.json();
      renderTable();
    }
  } catch (e) { console.log('Price fetch failed', e); }
}

async function scanAll() {
  if (watchlist.length === 0) return;
  const btn = document.getElementById('scanAllBtn');
  btn.disabled = true;
  document.getElementById('progressWrap').classList.add('active');

  for (let i = 0; i < watchlist.length; i++) {
    const w = watchlist[i];
    const pct = Math.round((i / watchlist.length) * 100);
    document.getElementById('progressFill').style.width = `${pct}%`;
    document.getElementById('progressStatus').textContent = `Scanning ${w.ticker} (${i + 1} of ${watchlist.length})...`;
    await scanTicker(w.ticker, false);
    if (i < watchlist.length - 1) await new Promise(r => setTimeout(r, 3000));
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressStatus').textContent = 'Complete!';
  setTimeout(() => document.getElementById('progressWrap').classList.remove('active'), 1000);
  btn.disabled = false;
  renderTable();
  renderHistory();
  updateSummary();
}

async function scanTicker(ticker, rerender = true) {
  const w = watchlist.find(w => w.ticker === ticker);
  if (!w) return;
  const prevSignal = w.signal;
  w.scanning = true;
  if (rerender) renderTable();

  try {
    const res = await fetch(`${API}/invest`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, asset_type: w.type })
    });
    const data = await res.json();
    if (res.ok) {
      w.signal = data.signal;
      w.confidence = data.confidence;
      w.assetName = data.asset_name;
      w.summary = data.summary;
      w.scannedAt = new Date().toISOString();
      w.prevSignal = prevSignal;

      // Save to history
      scanHistory.unshift({
        ticker, signal: data.signal, confidence: data.confidence,
        summary: data.summary, prevSignal,
        time: new Date().toISOString()
      });
      if (scanHistory.length > 100) scanHistory = scanHistory.slice(0, 100);
    }
  } catch (e) { w.error = true; }

  w.scanning = false;
  save();
  if (rerender) { renderTable(); renderHistory(); updateSummary(); }
}

function renderTable() {
  const body = document.getElementById('tableBody');
  if (watchlist.length === 0) {
    body.innerHTML = '<div class="empty-row">No tickers yet — add one above</div>';
    updateSummary();
    return;
  }

  // Sort: sell first, then buy, watch, hold, unsorted
  const order = { SELL: 0, BUY: 1, WATCH: 2, HOLD: 3 };
  const sorted = [...watchlist].sort((a, b) => {
    const ao = a.signal ? (order[a.signal] ?? 4) : 5;
    const bo = b.signal ? (order[b.signal] ?? 4) : 5;
    return ao - bo;
  });

  body.innerHTML = sorted.map(w => {
    const p = prices[w.ticker];
    const priceStr = p && p.price ? `$${p.price.toLocaleString()}` : '—';
    const changeVal = p && p.change_pct != null ? p.change_pct : null;
    const changeStr = changeVal != null ? `${changeVal > 0 ? '+' : ''}${changeVal}%` : '—';
    const changeClass = changeVal == null ? 'neu' : changeVal > 0 ? 'pos' : changeVal < 0 ? 'neg' : 'neu';
    const sigClass = w.signal ? w.signal.toLowerCase() : 'pending';
    const sigText = w.signal || 'Pending';

    // Alert if signal changed
    let alertText = '';
    if (w.signal && w.prevSignal && w.prevSignal !== w.signal) {
      alertText = `${w.prevSignal} → ${w.signal}`;
    }

    const timeStr = w.scannedAt ? timeAgo(w.scannedAt) : '—';

    return `
      <div class="ticker-row" id="row-${w.ticker}">
        <div>
          <div class="td-ticker">${w.ticker}</div>
          <div class="td-type">${w.type}</div>
        </div>
        <div class="td-price">${w.scanning ? '<span class="scanning">...</span>' : priceStr}</div>
        <div class="td-change ${changeClass}">${changeStr}</div>
        <div><span class="signal-badge ${sigClass}">${w.scanning ? '...' : sigText}</span></div>
        <div class="alert-badge">${alertText}</div>
        <div class="td-scanned">${timeStr}</div>
        <div><input class="note-input" placeholder="Add note..." value="${w.note || ''}" onchange="saveNote('${w.ticker}', this.value)" /></div>
        <div style="display:flex;align-items:center;">
          <button class="scan-row-btn" onclick="scanTicker('${w.ticker}')" ${w.scanning ? 'disabled' : ''}>Scan</button>
          <button class="remove-btn" onclick="removeTicker('${w.ticker}')">&times;</button>
        </div>
      </div>
    `;
  }).join('');

  updateSummary();
}

function updateSummary() {
  document.getElementById('cntSell').textContent = watchlist.filter(w => w.signal === 'SELL').length;
  document.getElementById('cntBuy').textContent = watchlist.filter(w => w.signal === 'BUY').length;
  document.getElementById('cntWatch').textContent = watchlist.filter(w => w.signal === 'WATCH').length;
  document.getElementById('cntHold').textContent = watchlist.filter(w => w.signal === 'HOLD').length;
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (scanHistory.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = scanHistory.slice(0, 20).map(h => {
    const changeText = h.prevSignal && h.prevSignal !== h.signal ? `${h.prevSignal} → ${h.signal}` : '';
    return `
      <div class="history-item">
        <div class="hi-ticker">${h.ticker}</div>
        <div><span class="signal-badge ${h.signal.toLowerCase()}">${h.signal}</span></div>
        <div class="hi-summary">${h.summary || ''}</div>
        <div>
          ${changeText ? `<div class="hi-change">⚡ ${changeText}</div>` : ''}
          <div class="hi-time">${timeAgo(h.time)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}
</script>
</body>
</html>
