<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onyx AI — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c18; --surface: #0d1224; --surface2: #111827;
      --border: #1e2740; --border2: #263354;
      --blue: #1565ff; --blue-glow: rgba(21,101,255,0.12);
      --white: #ffffff; --grey: #6b7280; --grey2: #9ca3af; --text: #e2e8f0;
      --green: #22c55e; --green-dim: rgba(34,197,94,0.1);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.1);
      --yellow: #f59e0b; --yellow-dim: rgba(245,158,11,0.1);
    }

    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; min-height: 100vh; }

    /* Top nav bar */
    .navbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; height: 52px; gap: 20px; position: sticky; top: 0; z-index: 100; }
    .logo-wrap { display: flex; align-items: center; gap: 8px; margin-right: 16px; }
    .logo-icon { width: 26px; height: 26px; background: var(--blue); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; font-family: 'JetBrains Mono', monospace; }
    .logo-txt { font-size: 14px; font-weight: 600; color: var(--white); }
    .nav-link { font-size: 12px; color: var(--grey2); text-decoration: none; padding: 4px 10px; border-radius: 5px; transition: all 0.12s; }
    .nav-link:hover { color: var(--white); background: var(--surface2); }
    .nav-link.active { color: var(--blue); background: var(--blue-glow); }
    .nav-link.disabled { color: var(--grey); opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .market-pill { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--grey); }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot.open { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .dot.closed { background: var(--red); box-shadow: 0 0 5px var(--red); }

    /* Toolbar */
    .toolbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 8px 24px; gap: 8px; }
    .toolbar-label { font-size: 11px; color: var(--grey); margin-right: 4px; }
    .input-sm { background: var(--bg); border: 1px solid var(--border2); color: var(--white); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 6px 10px; border-radius: 5px; outline: none; width: 120px; text-transform: uppercase; }
    .input-sm::placeholder { color: var(--grey); text-transform: none; font-family: 'Inter', sans-serif; }
    .input-sm:focus { border-color: var(--blue); }
    .select-sm { background: var(--bg); border: 1px solid var(--border2); color: var(--text); font-size: 12px; padding: 6px 8px; border-radius: 5px; outline: none; appearance: none; cursor: pointer; }
    .spacer { flex: 1; }
    .date-txt { font-size: 11px; color: var(--grey); font-family: 'JetBrains Mono', monospace; }

    .btn { border: none; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; padding: 6px 12px; border-radius: 5px; cursor: pointer; transition: all 0.12s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    .btn-ghost { background: transparent; color: var(--grey2); border: 1px solid var(--border2); }
    .btn-ghost:hover { color: var(--white); border-color: var(--grey); }
    .btn-blue { background: var(--blue); color: white; }
    .btn-blue:hover { background: #1a6fff; }
    .btn-blue:disabled { background: var(--border2); color: var(--grey); cursor: not-allowed; }

    /* Layout: table + right panel side by side */
    .content-wrap { display: flex; min-height: calc(100vh - 104px); }
    .table-section { flex: 1; overflow-x: auto; }
    .panel-section { width: 0; overflow: hidden; transition: width 0.25s ease; border-left: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .panel-section.open { width: 300px; }

    /* Progress bar */
    .progress-wrap { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 24px; }
    .progress-wrap.active { display: block; }
    .progress-track { background: var(--border); height: 2px; border-radius: 2px; margin-bottom: 4px; }
    .progress-fill { background: var(--blue); height: 2px; width: 0%; transition: width 0.4s; border-radius: 2px; }
    .progress-txt { font-size: 10px; color: var(--grey); font-family: 'JetBrains Mono', monospace; }

    /* Table */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl thead { background: var(--surface); position: sticky; top: 52px; z-index: 10; }
    .tbl th { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey); padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .tbl td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tbl tbody tr:hover { background: rgba(255,255,255,0.02); cursor: pointer; }
    .tbl tbody tr.selected { background: var(--blue-glow); }
    .tbl tbody tr.history-row { cursor: default; }
    .tbl tbody tr.history-row:hover { background: #090d1c; }

    /* Ticker cell */
    .ticker-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--white); }
    .ticker-sub { font-size: 10px; color: var(--grey); margin-top: 2px; }
    .alert-pill { font-size: 9px; background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(21,101,255,0.25); padding: 1px 5px; border-radius: 8px; margin-left: 6px; vertical-align: middle; }

    .price-cell { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--white); }
    .change-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; }
    .pos { color: var(--green); } .neg { color: var(--red); } .neu { color: var(--grey); }

    /* Score */
    .score-wrap { display: flex; align-items: center; gap: 8px; }
    .score-n { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; min-width: 30px; }
    .score-n.hi { color: var(--green); } .score-n.mi { color: var(--yellow); } .score-n.lo { color: var(--red); } .score-n.nd { color: var(--grey); font-size: 12px; }
    .score-bar { width: 40px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-fill { height: 3px; border-radius: 2px; }

    /* Signal */
    .sig { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; display: inline-block; white-space: nowrap; }
    .sig.buy { background: var(--green-dim); color: var(--green); }
    .sig.watch { background: var(--yellow-dim); color: var(--yellow); }
    .sig.hold { background: rgba(107,114,128,0.1); color: var(--grey2); }
    .sig.sell { background: var(--red-dim); color: var(--red); }
    .sig.pending { background: var(--border); color: var(--grey); }

    /* Action buttons */
    .act-wrap { display: flex; gap: 5px; }
    .act-btn { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 4px; border: 1px solid; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.12s; background: transparent; }
    .act-btn.buy { color: var(--green); border-color: rgba(34,197,94,0.35); }
    .act-btn.buy:hover { background: var(--green-dim); }
    .act-btn.sell { color: var(--red); border-color: rgba(239,68,68,0.35); }
    .act-btn.sell:hover { background: var(--red-dim); }

    /* Row controls */
    .ctrl-wrap { display: flex; align-items: center; gap: 5px; }
    .expand-btn { background: none; border: none; color: var(--grey); cursor: pointer; font-size: 11px; padding: 2px 4px; transition: transform 0.2s, color 0.12s; border-radius: 3px; }
    .expand-btn:hover { color: var(--white); }
    .expand-btn.open { transform: rotate(90deg); color: var(--blue); }
    .scan-sm { font-size: 10px; background: transparent; border: 1px solid var(--border2); color: var(--grey); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.12s; }
    .scan-sm:hover { border-color: var(--blue); color: var(--blue); }
    .scan-sm:disabled { opacity: 0.35; cursor: not-allowed; }
    .del-btn { background: none; border: none; color: var(--border2); cursor: pointer; font-size: 14px; padding: 2px 4px; transition: color 0.12s; border-radius: 3px; }
    .del-btn:hover { color: var(--red); }

    /* History drawer row */
    .history-drawer-row { background: #090d1c; }
    .history-inner { padding: 10px 16px 10px 48px; }
    .hist-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--grey); margin-bottom: 8px; }
    .hist-entry { display: grid; grid-template-columns: 60px 50px 1fr 80px; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); align-items: start; font-size: 11px; }
    .hist-entry:last-child { border-bottom: none; }
    .hist-sig { font-weight: 600; text-transform: uppercase; font-size: 10px; }
    .hist-score { font-family: 'JetBrains Mono', monospace; color: var(--grey2); }
    .hist-sum { color: var(--grey); line-height: 1.4; }
    .hist-time { color: var(--grey); font-family: 'JetBrains Mono', monospace; text-align: right; font-size: 10px; }
    .no-hist { font-size: 11px; color: var(--grey); font-style: italic; }

    /* Empty state */
    .empty-row td { padding: 60px; text-align: center; color: var(--grey); }
    .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.2; }

    /* Right panel */
    .panel-inner { padding: 0; display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
    .panel-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
    .panel-ticker { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 500; color: var(--white); }
    .panel-name { font-size: 11px; color: var(--grey); margin-top: 2px; }
    .panel-close { background: none; border: none; color: var(--grey); cursor: pointer; font-size: 18px; padding: 0; transition: color 0.12s; }
    .panel-close:hover { color: var(--white); }
    .panel-body { padding: 16px; flex: 1; }
    .panel-sec { margin-bottom: 18px; }
    .panel-sec-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--grey); margin-bottom: 8px; }
    .panel-score-big { font-family: 'JetBrains Mono', monospace; font-size: 40px; font-weight: 600; line-height: 1; }
    .panel-score-big.hi { color: var(--green); } .panel-score-big.mi { color: var(--yellow); } .panel-score-big.lo { color: var(--red); } .panel-score-big.nd { color: var(--grey); }
    .panel-signal-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .conf-track { background: var(--border); height: 3px; border-radius: 2px; width: 100%; margin-top: 8px; }
    .conf-fill { height: 3px; border-radius: 2px; background: var(--blue); }
    .conf-label { font-size: 10px; color: var(--grey); margin-top: 4px; }
    .panel-summary { font-size: 12px; color: var(--grey2); line-height: 1.7; }
    .panel-list { list-style: none; }
    .panel-li { font-size: 11px; color: var(--grey2); padding: 6px 0 6px 14px; border-bottom: 1px solid var(--border); position: relative; line-height: 1.5; }
    .panel-li:last-child { border-bottom: none; }
    .panel-li.up::before { content:'↑'; position:absolute; left:0; color:var(--green); }
    .panel-li.dn::before { content:'↓'; position:absolute; left:0; color:var(--red); }
    .panel-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .comment-area { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px; padding: 10px; resize: none; outline: none; line-height: 1.6; }
    .comment-area:focus { border-color: var(--blue); }
    .comment-area::placeholder { color: var(--border2); }
    .save-btn { margin-top: 6px; width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--grey2); font-family: 'Inter', sans-serif; font-size: 11px; padding: 7px; border-radius: 5px; cursor: pointer; transition: all 0.12s; }
    .save-btn:hover { border-color: var(--blue); color: var(--blue); }
    .panel-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--grey); text-align: center; padding: 24px; }

    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .scanning { animation: pulse 0.9s ease-in-out infinite; color: var(--blue); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo-wrap">
    <div class="logo-icon">O</div>
    <div class="logo-txt">ONYX AI</div>
  </div>
  <a class="nav-link active" href="/">Dashboard</a>
  <a class="nav-link" href="/search">Search & Predict</a>
  <a class="nav-link disabled" href="#">Trading</a>
  <div class="market-pill">
    <div class="dot" id="mktDot"></div>
    <span id="mktTxt">Checking...</span>
  </div>
</nav>

<!-- Toolbar -->
<div class="toolbar">
  <span class="toolbar-label">Add Ticker</span>
  <input class="input-sm" type="text" id="tickerInput" placeholder="e.g. AAPL" maxlength="10"/>
  <select class="select-sm" id="assetType">
    <option value="stock">Stock</option>
    <option value="crypto">Crypto</option>
  </select>
  <button class="btn btn-ghost" onclick="addTicker()">+ Add</button>
  <div class="spacer"></div>
  <span class="date-txt" id="topDate"></span>
  <button class="btn btn-ghost" onclick="refreshPrices()">↻ Prices</button>
  <button class="btn btn-blue" id="scanAllBtn" onclick="scanAll()">⚡ Scan All</button>
</div>

<!-- Progress -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-txt" id="progressTxt">Preparing...</div>
</div>

<!-- Content -->
<div class="content-wrap">
  <div class="table-section">
    <table class="tbl">
      <thead>
        <tr>
          <th style="width:36px"></th>
          <th>Ticker</th>
          <th>Price</th>
          <th>Change</th>
          <th>Score</th>
          <th>Signal</th>
          <th>Actions</th>
          <th style="width:100px"></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="empty-row"><td colspan="8">
          <div class="empty-icon">📊</div>
          <div style="font-size:13px;margin-bottom:4px;color:var(--grey2)">Your watchlist is empty</div>
          <div style="font-size:11px">Add a ticker above to get started</div>
        </td></tr>
      </tbody>
    </table>
  </div>

  <!-- Right panel -->
  <div class="panel-section" id="panelSection">
    <div class="panel-inner" id="panelInner">
      <div class="panel-placeholder">
        <div style="font-size:24px;margin-bottom:10px;opacity:0.2">👆</div>
        <div style="font-size:12px;line-height:1.6">Click any stock row to view details and add comments</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://prediction-api-production-ad66.up.railway.app';
let watchlist = JSON.parse(localStorage.getItem('onyx_wl_v3') || '[]');
let scanHistory = JSON.parse(localStorage.getItem('onyx_hist_v3') || '[]');
let comments = JSON.parse(localStorage.getItem('onyx_comments') || '{}');
let prices = {};
let selectedTicker = null;
let expandedRows = new Set();

// Init
const now = new Date();
document.getElementById('topDate').textContent = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
const h = now.getUTCHours(), d = now.getUTCDay();
const open = d > 0 && d < 6 && h >= 13 && h < 21;
document.getElementById('mktDot').className = 'dot ' + (open ? 'open' : 'closed');
document.getElementById('mktTxt').textContent = open ? 'Market Open' : 'Market Closed';
document.getElementById('tickerInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTicker(); });

renderTable();
if (watchlist.length > 0) refreshPrices();

function save() {
  localStorage.setItem('onyx_wl_v3', JSON.stringify(watchlist));
  localStorage.setItem('onyx_hist_v3', JSON.stringify(scanHistory));
  localStorage.setItem('onyx_comments', JSON.stringify(comments));
}

function addTicker() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  const type = document.getElementById('assetType').value;
  if (!ticker || watchlist.find(w => w.ticker === ticker)) {
    document.getElementById('tickerInput').value = '';
    return;
  }
  watchlist.push({ ticker, type, signal: null, score: null, confidence: null, scannedAt: null, prevSignal: null, catalysts: [], risks: [], signals: [] });
  save();
  renderTable();
  document.getElementById('tickerInput').value = '';
  refreshPrices();
}

function removeTicker(ticker) {
  if (selectedTicker === ticker) closePanel();
  watchlist = watchlist.filter(w => w.ticker !== ticker);
  expandedRows.delete(ticker);
  save();
  renderTable();
}

async function refreshPrices() {
  if (!watchlist.length) return;
  try {
    const res = await fetch(`${API}/prices?tickers=${encodeURIComponent(watchlist.map(w=>w.ticker).join(','))}`);
    if (res.ok) { prices = await res.json(); renderTable(); }
  } catch(e) {}
}

async function scanAll() {
  if (!watchlist.length) return;
  const btn = document.getElementById('scanAllBtn');
  btn.disabled = true;
  document.getElementById('progressWrap').classList.add('active');
  for (let i = 0; i < watchlist.length; i++) {
    document.getElementById('progressFill').style.width = `${Math.round((i/watchlist.length)*100)}%`;
    document.getElementById('progressTxt').textContent = `Analysing ${watchlist[i].ticker} (${i+1}/${watchlist.length})`;
    await scanTicker(watchlist[i].ticker, false);
    if (i < watchlist.length - 1) await sleep(3000);
  }
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressTxt').textContent = 'Scan complete';
  setTimeout(() => document.getElementById('progressWrap').classList.remove('active'), 1500);
  btn.disabled = false;
  renderTable();
  if (selectedTicker) renderPanel(selectedTicker);
}

async function scanTicker(ticker, rerender = true) {
  const w = watchlist.find(w => w.ticker === ticker);
  if (!w) return;
  const prev = w.signal;
  w.scanning = true;
  if (rerender) renderTable();
  try {
    const res = await fetch(`${API}/invest`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, asset_type: w.type })
    });
    const data = await res.json();
    if (res.ok) {
      w.signal = data.signal; w.assetName = data.asset_name; w.summary = data.summary;
      w.scannedAt = new Date().toISOString(); w.prevSignal = prev;
      w.catalysts = data.catalysts || []; w.risks = data.risks || [];
      w.signals = data.supporting_signals || []; w.confidence = data.confidence;
      const sm = { BUY:{High:8.5,Medium:7.0,Low:6.0}, WATCH:{High:6.0,Medium:5.5,Low:4.5}, HOLD:{High:5.0,Medium:4.5,Low:4.0}, SELL:{High:2.0,Medium:3.0,Low:3.5} };
      w.score = sm[data.signal]?.[data.confidence] ?? 5.0;
      scanHistory.unshift({ ticker, signal: data.signal, score: w.score, summary: data.summary, prevSignal: prev, time: new Date().toISOString() });
      if (scanHistory.length > 100) scanHistory = scanHistory.slice(0, 100);
    }
  } catch(e) {}
  w.scanning = false;
  save();
  if (rerender) { renderTable(); if (selectedTicker === ticker) renderPanel(ticker); }
}

function toggleRow(ticker) {
  if (expandedRows.has(ticker)) expandedRows.delete(ticker);
  else expandedRows.add(ticker);
  renderTable();
}

function selectStock(ticker) {
  selectedTicker = ticker;
  document.getElementById('panelSection').classList.add('open');
  renderPanel(ticker);
  document.querySelectorAll('tbody tr.main-row').forEach(r => r.classList.remove('selected'));
  const row = document.getElementById('row-' + ticker);
  if (row) row.classList.add('selected');
}

function closePanel() {
  selectedTicker = null;
  document.getElementById('panelSection').classList.remove('open');
  document.querySelectorAll('tbody tr.main-row').forEach(r => r.classList.remove('selected'));
}

function renderPanel(ticker) {
  const w = watchlist.find(w => w.ticker === ticker);
  if (!w) return;
  const sigCls = w.signal ? w.signal.toLowerCase() : 'pending';
  const sc = !w.score ? 'nd' : w.score >= 7 ? 'hi' : w.score >= 5 ? 'mi' : 'lo';
  const confPct = w.confidence === 'High' ? 85 : w.confidence === 'Medium' ? 60 : w.confidence === 'Low' ? 35 : 0;
  const comment = comments[ticker] || '';
  const hist = scanHistory.filter(h => h.ticker === ticker).slice(0, 5);

  document.getElementById('panelInner').innerHTML = `
    <div class="panel-head">
      <div>
        <div class="panel-ticker">${ticker}</div>
        <div class="panel-name">${w.assetName || w.type}</div>
      </div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body">
      ${w.signal ? `
      <div class="panel-sec">
        <div class="panel-signal-row">
          <div>
            <div class="panel-score-big ${sc}">${w.score ? w.score.toFixed(1) : '—'}</div>
            <div style="font-size:10px;color:var(--grey);margin-top:2px">/ 10 AI Score</div>
            <div class="conf-track"><div class="conf-fill" style="width:${confPct}%"></div></div>
            <div class="conf-label">Confidence: ${w.confidence || '—'}</div>
          </div>
          <span class="sig ${sigCls}" style="font-size:12px;padding:5px 12px">${w.signal}</span>
        </div>
        ${w.summary ? `<div class="panel-summary">${w.summary}</div>` : ''}
      </div>
      ${w.catalysts?.length ? `<div class="panel-sec"><div class="panel-sec-label" style="color:var(--green)">↑ Catalysts</div><ul class="panel-list">${w.catalysts.map(c=>`<li class="panel-li up">${c}</li>`).join('')}</ul></div>` : ''}
      ${w.risks?.length ? `<div class="panel-sec"><div class="panel-sec-label" style="color:var(--red)">↓ Risk Factors</div><ul class="panel-list">${w.risks.map(r=>`<li class="panel-li dn">${r}</li>`).join('')}</ul></div>` : ''}
      ` : `<div style="font-size:12px;color:var(--grey);margin-bottom:16px">No scan data yet — click Scan to analyse.</div>`}

      <hr class="panel-divider"/>
      <div class="panel-sec">
        <div class="panel-sec-label">Comments</div>
        <textarea class="comment-area" id="cmt-${ticker}" rows="5" placeholder="Notes, thesis, trade plan...">${comment}</textarea>
        <button class="save-btn" onclick="saveComment('${ticker}')">Save Comment</button>
      </div>

      ${hist.length ? `
      <hr class="panel-divider"/>
      <div class="panel-sec">
        <div class="panel-sec-label">Scan History</div>
        ${hist.map(h=>`
          <div class="hist-entry">
            <span class="hist-sig" style="color:${h.signal==='BUY'?'var(--green)':h.signal==='SELL'?'var(--red)':h.signal==='WATCH'?'var(--yellow)':'var(--grey2)'}">${h.signal}</span>
            <span class="hist-score">${h.score?.toFixed(1)||'—'}/10</span>
            <div class="hist-sum">${(h.summary||'').substring(0,80)}...</div>
            <div class="hist-time">${timeAgo(h.time)}</div>
          </div>
        `).join('')}
      </div>` : ''}
    </div>
  `;
}

function saveComment(ticker) {
  const val = document.getElementById('cmt-' + ticker)?.value || '';
  comments[ticker] = val;
  save();
}

function renderTable() {
  const body = document.getElementById('tableBody');
  if (!watchlist.length) {
    body.innerHTML = `<tr class="empty-row"><td colspan="8"><div class="empty-icon">📊</div><div style="font-size:13px;margin-bottom:4px;color:var(--grey2)">Your watchlist is empty</div><div style="font-size:11px">Add a ticker above to get started</div></td></tr>`;
    return;
  }

  const order = { SELL:0, BUY:1, WATCH:2, HOLD:3 };
  const sorted = [...watchlist].sort((a,b) => {
    if (a.signal && b.signal) return (order[a.signal]??4)-(order[b.signal]??4);
    if (a.signal) return -1; if (b.signal) return 1; return 0;
  });

  let rows = '';
  sorted.forEach(w => {
    const p = prices[w.ticker];
    const price = p?.price ? '$'+parseFloat(p.price).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
    const chg = p?.change_pct ?? null;
    const chgStr = chg!=null ? `${chg>0?'+':''}${chg}%` : '—';
    const chgCls = chg==null?'neu':chg>0?'pos':chg<0?'neg':'neu';
    const sigCls = w.signal?w.signal.toLowerCase():'pending';
    const sigTxt = w.scanning?'...':w.signal||'Pending';
    const sc = !w.score?'nd':w.score>=7?'hi':w.score>=5?'mi':'lo';
    const sbColor = !w.score?'#1e2740':w.score>=7?'#22c55e':w.score>=5?'#f59e0b':'#ef4444';
    const sbWidth = w.score?`${w.score*10}%`:'0%';
    const scoreTxt = w.scanning?'...':w.score?w.score.toFixed(1):'—';
    const isExp = expandedRows.has(w.ticker);
    const isSel = selectedTicker === w.ticker;
    const alertHtml = (w.signal && w.prevSignal && w.prevSignal!==w.signal) ? `<span class="alert-pill">⚡${w.prevSignal}→${w.signal}</span>` : '';
    const hist = scanHistory.filter(h => h.ticker === w.ticker);

    rows += `
      <tr class="main-row${isSel?' selected':''}" id="row-${w.ticker}" onclick="selectStock('${w.ticker}')">
        <td onclick="event.stopPropagation()">
          <button class="expand-btn${isExp?' open':''}" onclick="toggleRow('${w.ticker}')" title="Scan history">▶</button>
        </td>
        <td>
          <div class="ticker-name">${w.ticker}${alertHtml}</div>
          <div class="ticker-sub">${w.type}${w.scannedAt?' · '+timeAgo(w.scannedAt):''}</div>
        </td>
        <td class="price-cell${w.scanning?' scanning':''}">${w.scanning?'...':price}</td>
        <td class="change-cell ${chgCls}">${chgStr}</td>
        <td>
          <div class="score-wrap">
            <div class="score-n ${sc}">${scoreTxt}</div>
            <div class="score-bar"><div class="score-fill" style="width:${sbWidth};background:${sbColor}"></div></div>
          </div>
        </td>
        <td><span class="sig ${sigCls}">${sigTxt}</span></td>
        <td onclick="event.stopPropagation()">
          <div class="act-wrap">
            <button class="act-btn buy" onclick="alert('Trading coming soon!')">Buy</button>
            <button class="act-btn sell" onclick="alert('Trading coming soon!')">Sell</button>
          </div>
        </td>
        <td onclick="event.stopPropagation()">
          <div class="ctrl-wrap">
            <button class="scan-sm" onclick="scanTicker('${w.ticker}')" ${w.scanning?'disabled':''}>Scan</button>
            <button class="del-btn" onclick="removeTicker('${w.ticker}')">&times;</button>
          </div>
        </td>
      </tr>`;

    if (isExp) {
      rows += `
        <tr class="history-drawer-row">
          <td colspan="8">
            <div class="history-inner">
              <div class="hist-title">Scan History</div>
              ${hist.length ? hist.slice(0,5).map(h=>`
                <div class="hist-entry">
                  <span class="hist-sig" style="color:${h.signal==='BUY'?'var(--green)':h.signal==='SELL'?'var(--red)':h.signal==='WATCH'?'var(--yellow)':'var(--grey2)'}">${h.signal}</span>
                  <span class="hist-score">${h.score?.toFixed(1)||'—'}/10</span>
                  <div class="hist-sum">${(h.summary||'').substring(0,100)}...</div>
                  <div class="hist-time">${timeAgo(h.time)}</div>
                </div>`).join('') : '<div class="no-hist">No scan history yet</div>'}
            </div>
          </td>
        </tr>`;
    }
  });

  body.innerHTML = rows;
}

function timeAgo(iso) {
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if (s<60) return `${s}s ago`; if (s<3600) return `${Math.floor(s/60)}m ago`;
  if (s<86400) return `${Math.floor(s/3600)}h ago`; return `${Math.floor(s/86400)}d ago`;
}
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
</script>
</body>
</html>
