<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onyx AI — See What's Coming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --obsidian: #0f0f0f;
      --charcoal: #1a1a1a;
      --gold: #c9a84c;
      --gold-light: #e2c47a;
      --gold-dim: #7a6230;
      --white: #f0ece4;
      --muted: #6b6760;
      --text: #ccc5b9;
      --high: #4caf7a;
      --medium: #c9a84c;
      --low: #c0554a;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.02em;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 0 24px;
      border-bottom: 1px solid #1e1e1e;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo-mark {
      width: 22px;
      height: 22px;
      background: var(--gold);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      flex-shrink: 0;
      position: relative;
      top: 2px;
    }

    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--gold-dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* Hero */
    .hero {
      padding: 80px 0 64px;
      text-align: center;
    }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 300;
      color: var(--white);
      line-height: 1.05;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    /* Search panel */
    .search-panel {
      background: var(--obsidian);
      border: 1px solid #222;
      padding: 32px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .panel-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 20px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: stretch;
    }

    input[type="text"] {
      background: var(--charcoal);
      border: 1px solid #2a2a2a;
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--gold-dim); }

    select {
      background: var(--charcoal);
      border: 1px solid #2a2a2a;
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 14px 16px;
      outline: none;
      cursor: pointer;
      appearance: none;
      min-width: 140px;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--gold-dim); }

    .btn-generate {
      background: var(--gold);
      color: var(--black);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 28px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-generate:hover { background: var(--gold-light); }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { background: var(--gold-dim); cursor: not-allowed; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 60px 0;
    }

    .loading.active { display: block; }

    .loading-orb {
      width: 48px;
      height: 48px;
      margin: 0 auto 24px;
      position: relative;
    }

    .loading-orb::before, .loading-orb::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid var(--gold);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      animation: spin 2s linear infinite;
    }

    .loading-orb::after {
      inset: 8px;
      border-color: var(--gold-dim);
      animation-direction: reverse;
      animation-duration: 1.5s;
    }

    .loading-text {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Results */
    .results { display: none; }
    .results.active { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e1e1e;
    }

    .results-topic {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--white);
    }

    .results-meta {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .news-summary {
      background: var(--charcoal);
      border-left: 2px solid var(--gold-dim);
      padding: 16px 20px;
      margin-bottom: 32px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
    }

    .predictions-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 16px;
    }

    .prediction-card {
      background: var(--obsidian);
      border: 1px solid #1e1e1e;
      margin-bottom: 16px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .prediction-card:hover { border-color: #2e2e2e; }

    .card-top {
      padding: 24px;
      border-bottom: 1px solid #1a1a1a;
    }

    .card-statement {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--white);
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 10px;
      border: 1px solid;
    }

    .badge-high { color: var(--high); border-color: var(--high); }
    .badge-medium { color: var(--medium); border-color: var(--medium); }
    .badge-low { color: var(--low); border-color: var(--low); }

    .card-horizon {
      font-size: 11px;
      color: var(--muted);
    }

    .card-body {
      padding: 20px 24px;
    }

    .card-section-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .card-section-label:first-child { margin-top: 0; }

    .card-reasoning {
      font-size: 12px;
      line-height: 1.75;
      color: var(--muted);
    }

    .signals-list {
      list-style: none;
    }

    .signal-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 8px 0;
      border-bottom: 1px solid #181818;
      font-size: 11px;
    }

    .signal-item:last-child { border-bottom: none; }

    .signal-dot {
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      margin-top: 5px;
    }

    .signal-desc { color: var(--text); line-height: 1.5; }
    .signal-source { color: var(--muted); font-size: 10px; white-space: nowrap; }
    .signal-source[href] { color: var(--gold-dim); text-decoration: none; transition: color 0.2s; }
    .signal-source[href]:hover { color: var(--gold); }

    .risks-list {
      list-style: none;
    }

    .risk-item {
      font-size: 11px;
      color: var(--muted);
      padding: 5px 0;
      padding-left: 16px;
      position: relative;
      line-height: 1.5;
    }

    .risk-item::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--low);
    }

    /* Error */
    .error-box {
      display: none;
      background: #1a0e0e;
      border: 1px solid #3a1a1a;
      padding: 20px 24px;
      color: var(--low);
      font-size: 12px;
      line-height: 1.6;
    }

    .error-box.active { display: block; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    footer {
      margin-top: auto;
      padding: 32px 0;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      .input-row { grid-template-columns: 1fr; }
      .hero-title { font-size: 48px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-mark"></div>
      <span class="logo-name">Onyx</span>
      <span class="logo-sub">Intelligence</span>
    </div>
    <nav style="display:flex;gap:24px;"><a href="/" style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);text-decoration:none;">Predictions</a><a href="/invest" style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;">Investments</a></nav>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">AI-Powered Signal Intelligence</div>
    <h1 class="hero-title">See What's<br><em>Coming</em></h1>
    <p class="hero-sub">Enter a topic. Onyx scans the web and returns structured predictions with confidence levels.</p>
  </div>

  <div class="search-panel">
    <div class="panel-label">Intelligence Query</div>
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="e.g. Federal Reserve interest rate decision" />
      <select id="domainSelect">
        <option value="markets">Markets</option>
        <option value="tech">Tech</option>
        <option value="geopolitics">Geopolitics</option>
      </select>
      <button class="btn-generate" id="generateBtn" onclick="generatePrediction()">
        Analyse →
      </button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-orb"></div>
    <div class="loading-text">Scanning signals...</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-topic" id="resultsTopic"></div>
      <div class="results-meta" id="resultsMeta"></div>
    </div>
    <div class="news-summary" id="newsSummary"></div>
    <div class="predictions-label">Predictions</div>
    <div id="predictionsList"></div>
  </div>

  <footer>
    <span>Onyx AI · Prediction Intelligence</span>
    <span id="footerTime"></span>
  </footer>

</div>

<script>
  const API = 'https://prediction-api-production-ad66.up.railway.app';

  document.getElementById('footerTime').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generatePrediction();
  });

  async function generatePrediction() {
    const topic = document.getElementById('topicInput').value.trim();
    const domain = document.getElementById('domainSelect').value;

    if (!topic) {
      document.getElementById('topicInput').focus();
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;

    document.getElementById('loading').classList.add('active');
    document.getElementById('results').classList.remove('active');
    document.getElementById('errorBox').classList.remove('active');

    try {
      const res = await fetch(`${API}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic, domain, time_horizon: '1-2 weeks' })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || 'An error occurred');
      }

      renderResults(data);

    } catch (err) {
      const eb = document.getElementById('errorBox');
      eb.textContent = `Error: ${err.message}`;
      eb.classList.add('active');
    } finally {
      document.getElementById('loading').classList.remove('active');
      btn.disabled = false;
    }
  }

  function renderResults(data) {
    document.getElementById('resultsTopic').textContent = data.topic;
    document.getElementById('resultsMeta').textContent =
      data.domain.toUpperCase() + ' · ' + new Date(data.created_at).toLocaleTimeString();
    document.getElementById('newsSummary').textContent = data.news_summary;

    const list = document.getElementById('predictionsList');
    list.innerHTML = '';

    data.predictions.forEach(p => {
      const confidenceClass = p.confidence.toLowerCase();

      const signals = p.supporting_signals.map(s => {
        const sourceLink = s.source
          ? `<a class="signal-source" href="https://www.google.com/search?q=${encodeURIComponent(s.source + ' ' + s.description)}" target="_blank" rel="noopener">${s.source} ↗</a>`
          : '';
        return `
        <li class="signal-item">
          <div class="signal-dot"></div>
          <div class="signal-desc">${s.description}</div>
          ${sourceLink}
        </li>`;
      }).join('');

      const risks = p.risk_factors.map(r => `
        <li class="risk-item">${r}</li>
      `).join('');

      const card = document.createElement('div');
      card.className = 'prediction-card';
      card.innerHTML = `
        <div class="card-top">
          <div class="card-statement">${p.statement}</div>
          <div class="card-meta">
            <span class="badge badge-${confidenceClass}">${p.confidence} Confidence</span>
            <span class="card-horizon">${p.time_horizon}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-section-label">Reasoning</div>
          <div class="card-reasoning">${p.reasoning}</div>

          <div class="card-section-label">Supporting Signals</div>
          <ul class="signals-list">${signals}</ul>

          <div class="card-section-label">Risk Factors</div>
          <ul class="risks-list">${risks}</ul>
        </div>
      `;
      list.appendChild(card);
    });

    document.getElementById('results').classList.add('active');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
